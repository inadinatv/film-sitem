<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnadına TV - Film Kuşağı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --primary-hover: #ff5e62; --bg: #0b0b0b; --card-bg: #1a1a1a; --text: #ffffff; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* Üst Menü / Header */
        header { 
            padding: 15px 5%; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: rgba(17,17,17,0.95); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); 
        }

        .logo { 
            font-weight: 800; 
            font-size: 22px; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            background: linear-gradient(90deg, var(--primary), var(--primary-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo i {
            -webkit-text-fill-color: var(--primary);
            font-size: 24px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper i {
            position: absolute;
            left: 12px;
            color: #aaa;
            pointer-events: none;
            font-size: 14px;
            z-index: 2;
        }

        .search-box { 
            width: 38px; 
            height: 38px; 
            border-radius: 19px; 
            background: rgba(255,255,255,0.1); 
            border: none; 
            outline: none; 
            color: white; 
            padding: 5px 15px 5px 35px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s; 
            font-family: inherit;
            cursor: pointer;
        }

        .search-box::placeholder { color: transparent; transition: color 0.3s; }
        
        .search-box:focus, .search-box:not(:placeholder-shown) {
            width: 220px; 
            background: #222;
            cursor: text;
        }
        
        .search-box:focus::placeholder, .search-box:not(:placeholder-shown)::placeholder { 
            color: #888; 
        }

        .menu-btn { font-size: 24px; cursor: pointer; color: white; transition: color 0.3s;}
        .menu-btn:hover { color: var(--primary); }

        /* Yan Menü (Kategoriler) */
        .sidebar { 
            position: fixed; 
            right: -280px; 
            top: 0; 
            width: 250px; 
            height: 100%; 
            background: #111; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 2000; 
            padding: 20px; 
            box-shadow: -5px 0 20px rgba(0,0,0,0.8); 
            overflow-y: auto; 
        }

        .sidebar.active { right: 0; }

        .cat-item { 
            display: flex; 
            align-items: center;
            padding: 12px; 
            color: #ccc; 
            text-decoration: none; 
            border-radius: 8px; 
            margin-bottom: 5px; 
            font-size: 14px;
            transition: 0.2s;
        }

        .cat-item i { width: 25px; text-align: center; margin-right: 5px; font-size: 16px; opacity: 0.8; }
        .cat-item:hover, .cat-item.active { background: var(--primary); color: white; }
        .cat-item:hover i, .cat-item.active i { opacity: 1; }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Film Tablosu (Grid) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
            padding: 20px 5%; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 10px; 
            overflow: hidden; 
            cursor: pointer; 
            position: relative; 
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card h3 { font-size: 13px; padding: 10px; margin: 0; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .badge { 
            position: absolute; 
            top: 8px; 
            left: 8px; 
            background: rgba(0,0,0,0.8); 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-size: 10px; 
            font-weight: bold; 
            color: var(--primary);
            backdrop-filter: blur(2px);
        }

        .load-more { 
            display: block; 
            margin: 20px auto 40px; 
            padding: 12px 30px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .load-more:hover { background: var(--primary-hover); transform: scale(1.05); }

        /* YENİ MODAL (ARKAPLAN KAPLAMALI) */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.92); 
            z-index: 3000; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
        }

        .modal-content { 
            background-color: #111;
            background-size: cover !important;
            background-position: center !important;
            padding: 25px 20px; 
            border-radius: 20px; 
            max-width: 450px; 
            width: 100%; 
            min-height: 450px;
            text-align: center; 
            position: relative; 
            max-height: 90vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; /* İçeriği aşağı iter */
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Resmin üzerini hafif karartmak için */
        .modal-content::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #0b0b0b 10%, rgba(11,11,11,0.8) 45%, rgba(11,11,11,0.2) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .modal-inner {
            position: relative;
            z-index: 2; /* Karartmanın üstünde durması için */
        }

        .close-modal { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            font-size: 30px; 
            cursor: pointer; 
            color: #fff; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: 0.2s;
            z-index: 3;
        }
        .close-modal:hover { color: var(--primary); }
        
        #mTitle {
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            font-size: 24px;
        }

        #mInfo {
            color: #ff5e62; 
            font-size: 13px; 
            font-weight: bold; 
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        #mDesc { 
            font-size: 13px; 
            color: #eee; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px); /* Cam efekti */
            -webkit-backdrop-filter: blur(8px);
            padding: 15px; 
            border-radius: 12px; 
            max-height: 120px; 
            overflow-y: auto; 
            text-align: left; 
            line-height: 1.5; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .lang-group { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            overflow-y: auto; 
            max-height: 150px; 
            padding-right: 5px; 
        }

        .play-btn { 
            background: rgba(229, 9, 20, 0.9); 
            backdrop-filter: blur(5px);
            color: white; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .play-btn:hover { background: var(--primary); transform: translateY(-2px); }

        #mDesc::-webkit-scrollbar, .lang-group::-webkit-scrollbar { width: 5px; }
        #mDesc::-webkit-scrollbar-thumb, .lang-group::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }

        /* MOBİL UYUMLULUK (3 SÜTUN OTOMATİK AYAR) */
        @media (max-width: 600px) {
            header { padding: 12px 15px; }
            .logo { font-size: 18px; }
            .logo i { font-size: 20px; }
            
            .search-box:focus, .search-box:not(:placeholder-shown) { width: 150px; }

            .grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 8px; 
                padding: 15px 10px; 
            }
            .card { border-radius: 8px; }
            .card img { height: 145px; }
            .card h3 { font-size: 10px; padding: 6px 4px; }
            .badge { font-size: 8px; padding: 3px 5px; top: 5px; left: 5px; }
            
            #mTitle { font-size: 20px; }
            .modal-content { min-height: 400px; }
        }

        @media (max-width: 380px) {
            .search-box:focus, .search-box:not(:placeholder-shown) { width: 120px; }
            .card img { height: 130px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo"><i class="fas fa-play-circle"></i> İNADINA TV</a>
    <div class="header-actions">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" class="search-box" placeholder="Film ara..." onkeyup="filter()">
        </div>
        <div class="menu-btn" onclick="toggle()"><i class="fas fa-bars"></i></div>
    </div>
</header>

<div class="sidebar" id="sidebar">
    <div style="text-align: right; font-size: 28px; cursor: pointer; margin-bottom: 10px; color: #888;" onclick="toggle()">&times;</div>
    <h2 style="border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top:0; font-size: 18px;">Kategoriler</h2>
    <div id="catList"></div>
</div>

<div class="grid" id="movieGrid"></div>
<button id="loadMoreBtn" class="load-more" onclick="loadMore()">DAHA FAZLA GÖSTER</button>

<div id="movieModal" class="modal">
    <div class="modal-content" id="modalContent">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        
        <div class="modal-inner">
            <h2 id="mTitle"></h2>
            <div id="mInfo"></div>
            <div id="mDesc"></div>
            <div id="langButtons" class="lang-group"></div>
        </div>
    </div>
</div>

<script>
    let all = [], filtered = [], limit = 20, activeCat = "Tümü";

    // Tüm orijinal kategorilerin tam listesi (Romantik Eklendi)
    const fullCategories = [
        "Tümü", "Türkçe Dublaj", "Altyazılı Filmler", "4K", "Aile", "Aksiyon",
        "Animasyon", "Belgesel", "Bilim-Kurgu", "Dram", "Fantastik", "Gerilim",
        "Gizem", "Hint Filmleri", "Kısa Film", "Komedi", "Korku", "Kült Filmler",
        "Macera", "Müzik", "Oscar Ödüllü", "Romantik", "Savaş", "Spor", "Suç", "Tarih", "Yerli Filmler"
    ];

    // 1. Verileri Başlat
    async function init() {
        renderCats(); // Önce yan menüyü her halükarda çiz
        try {
            const res = await fetch('movies.json');
            all = await res.json();
            filtered = all;
            render();
        } catch(e) { 
            document.getElementById('movieGrid').innerHTML = "<p style='text-align:center; width:100%'>Lütfen botu çalıştırıp verileri çekin.</p>"; 
        }
    }

    // Kategoriler için dinamik ve detaylı ikon seçici (Romantik İkonu Eklendi)
    function getCatIcon(cat) {
        const lower = cat.toLowerCase();
        if(lower.includes('dublaj')) return 'fa-microphone';
        if(lower.includes('altyaz')) return 'fa-closed-captioning';
        if(lower.includes('4k')) return 'fa-tv';
        if(lower.includes('aile')) return 'fa-users';
        if(lower.includes('aksiyon')) return 'fa-fighter-jet';
        if(lower.includes('animasyon')) return 'fa-snowman';
        if(lower.includes('belgesel')) return 'fa-paw';
        if(lower.includes('bilim')) return 'fa-rocket';
        if(lower.includes('dram')) return 'fa-theater-masks';
        if(lower.includes('fantastik')) return 'fa-dragon';
        if(lower.includes('gerilim')) return 'fa-heartbeat';
        if(lower.includes('gizem')) return 'fa-user-secret';
        if(lower.includes('hint')) return 'fa-om';
        if(lower.includes('kısa')) return 'fa-stopwatch';
        if(lower.includes('komedi')) return 'fa-laugh-squint';
        if(lower.includes('korku')) return 'fa-ghost';
        if(lower.includes('kült')) return 'fa-gem';
        if(lower.includes('macera')) return 'fa-map-marked-alt';
        if(lower.includes('müzik')) return 'fa-music';
        if(lower.includes('oscar')) return 'fa-award';
        if(lower.includes('romantik')) return 'fa-heart';
        if(lower.includes('savaş')) return 'fa-bomb';
        if(lower.includes('spor')) return 'fa-futbol';
        if(lower.includes('suç')) return 'fa-gavel';
        if(lower.includes('tarih')) return 'fa-monument';
        if(lower.includes('yerli')) return 'fa-star-and-crescent';
        if(lower.includes('tümü')) return 'fa-list-ul';
        return 'fa-film'; // Varsayılan
    }

    // 2. Tam Kategori Listesini Yan Menüye Diz
    function renderCats() {
        document.getElementById('catList').innerHTML = fullCategories.map(c => 
            `<a href="#" class="cat-item ${c === activeCat ? 'active' : ''}" onclick="setCat('${c}')">
                <i class="fas ${getCatIcon(c)}"></i> ${c}
            </a>`
        ).join("");
    }

    // 3. Filmleri Ekrana Çiz
    function render() {
        const grid = document.getElementById('movieGrid');
        const items = filtered.slice(0, limit);
        grid.innerHTML = items.map(f => `
            <div class="card" onclick="openModal('${f.id}', '${f.title.replace(/'/g, "\\'")}', '${f.image}', '${f.year}', '${f.category}')">
                <span class="badge">${f.category}</span>
                <img src="${f.image}" loading="lazy" alt="${f.title}">
                <h3>${f.title}</h3>
            </div>
        `).join("");
        document.getElementById('loadMoreBtn').style.display = limit >= filtered.length ? 'none' : 'block';
    }

    // 4. Arama ve Filtreleme
    function loadMore() { limit += 20; render(); }
    function setCat(c) { activeCat = c; filter(); toggle(); renderCats(); }
    function toggle() { document.getElementById('sidebar').classList.toggle('active'); }

    function filter() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        filtered = all.filter(m => 
            (activeCat === "Tümü" || m.category === activeCat) && 
            m.title.toLowerCase().includes(term)
        );
        limit = 20; 
        render();
    }

    // 5. YENİ: Arkaplanlı Detay Penceresini Aç
    async function openModal(id, title, img, year, cat) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mInfo').innerText = `${year} • ${cat}`;
        
        // Modalın arka plan resmini değiştiriyoruz
        document.getElementById('modalContent').style.backgroundImage = `url('${img}')`;

        document.getElementById('mDesc').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bilgiler ve dil seçenekleri aranıyor...';
        document.getElementById('langButtons').innerHTML = "";
        document.getElementById('movieModal').style.display = 'flex';

        try {
            const res = await fetch(`/api/info?id=${id}`);
            const data = await res.json();
            document.getElementById('mDesc').innerText = data.desc || "Film açıklaması bulunamadı.";
            
            const btnBox = document.getElementById('langButtons');
            if(data.languages && data.languages.length > 0) {
                data.languages.forEach(l => {
                    let icon = l.name.toLowerCase().includes('altyaz') ? 'fa-comment-dots' : 'fa-microphone-alt';
                    btnBox.innerHTML += `<a href="${l.url}" target="_blank" class="play-btn"><i class="fas ${icon}"></i> ${l.name.toUpperCase()}</a>`;
                });
            } else {
                btnBox.innerHTML = `<a href="/api/play?id=${id}" target="_blank" class="play-btn"><i class="fas fa-play"></i> FİLMİ OYNAT</a>`;
            }
        } catch(e) { 
            document.getElementById('mDesc').innerText = "Bağlantı hatası: Detaylar alınamadı."; 
        }
    }

    function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
    window.onclick = function(e) { if(e.target == document.getElementById('movieModal')) closeModal(); }
    
    init();
</script>
</body>
</html>
