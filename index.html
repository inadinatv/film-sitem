<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnadına TV - Film Kuşağı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #e50914; --bg: #0b0b0b; --card-bg: #1a1a1a; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; background: #111; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--primary); font-weight: 800; font-size: 22px; text-decoration: none; }
        .search-box { flex: 1; margin: 0 20px; padding: 10px; border-radius: 20px; border: none; background: #222; color: white; }
        .sidebar { position: fixed; right: -280px; top: 0; width: 250px; height: 100%; background: #111; transition: 0.3s; z-index: 2000; padding: 20px; box-shadow: -5px 0 15px #000; }
        .sidebar.active { right: 0; }
        .cat-item { display: block; padding: 12px; color: #ccc; text-decoration: none; border-bottom: 1px solid #222; }
        .cat-item:hover { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .load-more { display: block; margin: 20px auto; padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 20px; max-width: 450px; width: 100%; text-align: center; }
        .play-btn { background: var(--primary); color: white; padding: 12px; display: block; margin-top: 10px; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">İNADINA TV</a>
    <input type="text" id="searchInput" class="search-box" placeholder="Film ara..." onkeyup="resetAndFilter()">
    <i class="fas fa-bars" style="font-size: 24px; cursor: pointer;" onclick="toggleMenu()"></i>
</header>

<div class="sidebar" id="sidebar">
    <h2 style="border-bottom: 2px solid var(--primary);">Kategoriler</h2>
    <div id="catList"></div>
</div>

<div class="grid" id="movieGrid"></div>
<button id="loadMoreBtn" class="load-more" onclick="loadMore()">DAHA FAZLA GÖSTER</button>

<div id="movieModal" class="modal">
    <div class="modal-content">
        <span style="float: right; cursor: pointer; font-size: 30px;" onclick="closeModal()">&times;</span>
        <img id="mImg" src="" style="width: 140px; border-radius: 10px; border: 2px solid var(--primary);">
        <h2 id="mTitle"></h2>
        <p id="mDesc" style="font-size: 14px; color: #ccc;"></p>
        <div id="langButtons"></div>
    </div>
</div>

<script>
    let all = [], filtered = [], count = 20, currentCat = "Tümü";

    async function init() {
        const res = await fetch('movies.json');
        all = await res.json();
        filtered = all;
        renderCats(); render();
    }

    function renderCats() {
        const cs = ["Tümü", ...new Set(all.map(m => m.category))];
        document.getElementById('catList').innerHTML = cs.map(c => `<a href="#" class="cat-item" onclick="filterCat('${c}')">${c}</a>`).join("");
    }

    function render() {
        const g = document.getElementById('movieGrid');
        g.innerHTML = filtered.slice(0, count).map(f => `
            <div class="card" onclick="openModal('${f.id}', '${f.title.replace(/'/g, "\\'")}', '${f.image}')">
                <img src="${f.image}">
                <h3 style="font-size: 13px;">${f.title}</h3>
            </div>
        `).join("");
        document.getElementById('loadMoreBtn').style.display = count >= filtered.length ? 'none' : 'block';
    }

    function loadMore() { count += 20; render(); }
    function filterCat(c) { currentCat = c; resetAndFilter(); toggleMenu(); }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

    function resetAndFilter() {
        const t = document.getElementById('searchInput').value.toLowerCase();
        filtered = all.filter(m => (currentCat === "Tümü" || m.category === currentCat) && m.title.toLowerCase().includes(t));
        count = 20; render();
    }

    async function openModal(id, title, img) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mImg').src = img;
        document.getElementById('mDesc').innerText = "Yükleniyor...";
        document.getElementById('langButtons').innerHTML = "";
        document.getElementById('movieModal').style.display = 'flex';

        const res = await fetch(`/api/info?id=${id}`);
        const data = await res.json();
        document.getElementById('mDesc').innerText = data.desc;
        data.languages.forEach(l => {
            document.getElementById('langButtons').innerHTML += `<a href="/api/play?id=${id}&vid=${l.vId}" target="_blank" class="play-btn">${l.name.toUpperCase()}</a>`;
        });
    }

    function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
    init();
</script>
</body>
</html>
