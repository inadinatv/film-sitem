<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnadına TV - Film Kuşağı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #0b0b0b; --card-bg: #1a1a1a; --text: #ffffff; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* Header ve Navigasyon */
        header { 
            padding: 15px 5%; 
            background: rgba(17,17,17,0.95); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .nav-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .logo { 
            font-size: 24px; 
            font-weight: 700; 
            color: var(--primary); 
            text-decoration: none;
            text-align: center;
        }

        /* Kategori Menüsü */
        .category-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 5px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .category-scroll::-webkit-scrollbar { height: 4px; }
        .category-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .cat-btn {
            background: var(--card-bg);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
            font-size: 13px;
        }

        .cat-btn.active, .cat-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Arama Çubuğu */
        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: #222;
            border: none;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }

        /* Film Kartları - Yan yana 3'lü Düzen */
        .container { padding: 20px 5%; }
        
        .movie-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* Masaüstü ve Geniş ekranlarda 3'lü */
            gap: 15px; 
        }

        @media (max-width: 768px) {
            .movie-grid { grid-template-columns: repeat(3, 1fr); } /* Mobilde de 3'lü olması için zorladık */
            .container { padding: 10px; }
            .cat-btn { font-size: 12px; padding: 5px 12px; }
        }

        @media (max-width: 480px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); } /* Çok küçük ekranlarda 2'li daha iyi görünebilir */
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
        }

        .movie-card:hover { transform: scale(1.05); z-index: 5; }

        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        .movie-info { padding: 8px; }
        .movie-title { 
            font-size: 12px; 
            font-weight: 400; 
            margin: 0; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        
        .movie-year { font-size: 10px; color: #aaa; }

        /* Modal Stilleri */
        #movieModal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: #111; width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 25px; cursor: pointer; color: #fff; }
        .modal-body { padding: 20px; text-align: center; }
        .play-btn { 
            display: inline-block; background: var(--primary); color: white; padding: 12px 25px; 
            border-radius: 30px; text-decoration: none; margin-top: 20px; font-weight: bold; width: 100%; box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="#" class="logo">İNADINA TV</a>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Film ara..." onkeyup="filterMovies()">
        </div>

        <div class="category-scroll" id="categoryMenu">
            <div class="cat-btn active" onclick="filterCategory('Hepsi')">Hepsi</div>
            </div>
    </div>
</header>

<div class="container">
    <div class="movie-grid" id="movieGrid">
        </div>
</div>

<div id="movieModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-body">
            <h2 id="mTitle" style="color: var(--primary);"></h2>
            <p id="mDesc" style="font-size: 14px; color: #ccc; line-height: 1.6;"></p>
            <div id="langButtons"></div>
        </div>
    </div>
</div>

<script>
    let allMovies = [];
    const categories = [
        "Türkçe Dublaj", "Altyazılı Filmler", "4K", "Aile", "Aksiyon", 
        "Animasyon", "Belgesel", "Bilim-Kurgu", "Dram", "Fantastik", 
        "Gerilim", "Gizem", "Hint Filmleri", "Kısa Film", "Komedi", 
        "Korku", "Kült Filmler", "Macera", "Müzik", "Romantik", 
        "Savaş", "Suç", "Tarih", "Western"
    ];

    // Kategori butonlarını oluştur
    function setupCategories() {
        const menu = document.getElementById('categoryMenu');
        categories.forEach(cat => {
            const btn = document.createElement('div');
            btn.className = 'cat-btn';
            btn.innerText = cat;
            btn.onclick = () => filterCategory(cat, btn);
            menu.appendChild(btn);
        });
    }

    async function loadMovies() {
        try {
            const res = await fetch('movies.json');
            allMovies = await res.json();
            displayMovies(allMovies);
        } catch (e) { console.error("Filmler yüklenemedi:", e); }
    }

    function displayMovies(movies) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = movies.map(m => `
            <div class="movie-card" onclick="openMovie('${m.id}', '${m.title}')">
                <img src="${m.image}" alt="${m.title}" loading="lazy">
                <div class="movie-info">
                    <h3 class="movie-title">${m.title || 'İsimsiz Film'}</h3>
                    <span class="movie-year">${m.year}</span>
                </div>
            </div>
        `).join('');
    }

    function filterMovies() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
        displayMovies(filtered);
    }

    function filterCategory(category, element) {
        // Aktif buton rengini değiştir
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        if(element) element.classList.add('active');

        if (category === 'Hepsi') {
            displayMovies(allMovies);
        } else {
            const filtered = allMovies.filter(m => m.category === category);
            displayMovies(filtered);
        }
    }

    async function openMovie(id, title) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mDesc').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bilgiler aranıyor...';
        document.getElementById('langButtons').innerHTML = "";
        document.getElementById('movieModal').style.display = 'flex';

        try {
            const res = await fetch(`/api/info?id=${id}`);
            const data = await res.json();
            document.getElementById('mDesc').innerText = data.desc || "Açıklama bulunamadı.";
            
            const btnBox = document.getElementById('langButtons');
            if(data.languages && data.languages.length > 0) {
                data.languages.forEach(l => {
                    let icon = l.name.toLowerCase().includes('altyaz') ? 'fa-comment-dots' : 'fa-microphone-alt';
                    btnBox.innerHTML += `<a href="${l.url}" target="_blank" class="play-btn"><i class="fas ${icon}"></i> ${l.name.toUpperCase()}</a>`;
                });
            } else {
                btnBox.innerHTML = `<a href="/api/play?id=${id}" target="_blank" class="play-btn"><i class="fas fa-play"></i> OYNAT</a>`;
            }
        } catch(e) { 
            document.getElementById('mDesc').innerText = "Hata oluştu."; 
        }
    }

    function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
    
    window.onload = () => {
        setupCategories();
        loadMovies();
    };
</script>

</body>
</html>
