<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnadına TV - Film Kuşağı</title>
    <style>
        :root { --primary: #e50914; --bg: #0f0f0f; --card-bg: #1f1f1f; --text: #ffffff; --shadow: 0 10px 30px rgba(0,0,0,0.8); }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        header { padding: 20px; text-align: center; background: #1a1a1a; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin: 0 0 15px 0; font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .search-box { width: 90%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: none; background: var(--card-bg); color: white; outline: none; margin-bottom: 15px; font-size: 16px; }

        /* Kategori Menüsü */
        .categories { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; max-width: 800px; margin: 0 auto; }
        .cat-btn { background: var(--card-bg); border: 1px solid #333; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); border-color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
        .card:hover { transform: scale(1.05); box-shadow: var(--shadow); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card h3 { font-size: 13px; padding: 8px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
        .card .badge { position: absolute; top: 5px; right: 5px; background: rgba(229,9,20,0.8); padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; }

        /* Detay Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); margin: 10% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 20px; text-align: center; animation: slideUp 0.4s ease; position: relative; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .play-btn { background: var(--primary); color: white; padding: 12px; display: block; margin-top: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #aaa; cursor: pointer; font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>🎬 İNADINA TV FİLM KUŞAĞI</h1>
    <input type="text" id="searchInput" class="search-box" placeholder="Film ara..." onkeyup="filterMovies()">
    
    <div class="categories" id="categoryContainer">
        </div>
</header>

<div class="grid" id="movieGrid">Yükleniyor... (Eğer filmler gelmiyorsa GitHub'dan botu tekrar çalıştırın)</div>

<div id="movieModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" style="width: 150px; border-radius: 10px; margin-bottom: 10px;">
        <h2 id="modalTitle" style="font-size: 18px; margin-bottom: 5px;">Film Adı</h2>
        <span id="modalCat" style="color: var(--primary); font-size: 12px;">Kategori</span>
        <a id="playLink" href="#" target="_blank" class="play-btn">▶ Player ile İzle</a>
    </div>
</div>

<script>
    let allMovies = [];
    let currentCategory = "Tümü";

    async function fetchMovies() {
        try {
            const res = await fetch('movies.json');
            allMovies = await res.json();
            setupCategories();
            filterMovies();
        } catch (e) {
            document.getElementById('movieGrid').innerHTML = "Film verileri çekilemedi.";
        }
    }

    function setupCategories() {
        const container = document.getElementById('categoryContainer');
        // Benzersiz kategorileri bul
        const categories = ["Tümü", ...new Set(allMovies.map(m => m.category).filter(Boolean))];
        
        container.innerHTML = categories.map(cat => 
            `<button class="cat-btn ${cat === 'Tümü' ? 'active' : ''}" onclick="selectCategory('${cat}', this)">${cat}</button>`
        ).join("");
    }

    function selectCategory(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterMovies();
    }

    function filterMovies() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allMovies.filter(f => 
            (currentCategory === "Tümü" || f.category === currentCategory) &&
            f.title.toLowerCase().includes(term)
        );
        
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = filtered.map(film => `
            <div class="card" onclick="openModal('${film.id}', '${film.title.replace(/'/g, "\\'")}', '${film.image}', '${film.category}')">
                <span class="badge">${film.category || 'Film'}</span>
                <img src="${film.image}" alt="Afiş" loading="lazy">
                <h3>${film.title}</h3>
            </div>
        `).join("");
    }

    function openModal(id, title, image, category) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalImg').src = image;
        document.getElementById('modalCat').innerText = category;
        document.getElementById('playLink').href = `/api/play?id=${id}`;
        document.getElementById('movieModal').style.display = "block";
    }

    function closeModal() { document.getElementById('movieModal').style.display = "none"; }
    window.onclick = function(e) { if (e.target == document.getElementById('movieModal')) closeModal(); }

    fetchMovies();
</script>
</body>
</html>
