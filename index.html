<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnadına TV - Film Kuşağı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #e50914; --bg: #0b0b0b; --card-bg: #1a1a1a; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        header { padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; background: #111; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px #000; }
        .logo { color: var(--primary); font-weight: 800; font-size: 20px; text-decoration: none; }
        .search-box { flex: 1; margin: 0 15px; padding: 10px 15px; border-radius: 20px; border: none; background: #222; color: white; outline: none; }
        .menu-btn { font-size: 24px; cursor: pointer; color: white; }
        .sidebar { position: fixed; right: -280px; top: 0; width: 250px; height: 100%; background: #111; transition: 0.3s; z-index: 2000; padding: 20px; box-shadow: -5px 0 20px #000; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .cat-item { display: block; padding: 12px; color: #ccc; text-decoration: none; border-radius: 8px; margin-bottom: 5px; }
        .cat-item:hover, .cat-item.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card h3 { font-size: 12px; padding: 10px; margin: 0; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .load-more { display: block; margin: 20px auto 40px; padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        /* MOBİL UYUMLU TAŞMAYAN MODAL (SCROLL) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: #181818; padding: 25px 20px; border-radius: 20px; max-width: 450px; width: 100%; text-align: center; position: relative; max-height: 85vh; display: flex; flex-direction: column; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #888; }
        #mImg { width: 110px; border-radius: 10px; margin: 0 auto 10px; border: 2px solid var(--primary); }
        #mTitle { font-size: 18px; margin: 0 0 5px 0; }
        
        /* Kaydırma Çubukları Eklendi */
        #mDesc { font-size: 13px; color: #ccc; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; max-height: 100px; overflow-y: auto; text-align: justify; margin-bottom: 15px; }
        .lang-group { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 140px; padding-right: 5px; }
        .play-btn { background: var(--primary); color: white; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">İNADINA TV</a>
    <input type="text" id="searchInput" class="search-box" placeholder="Film ara..." onkeyup="filter()">
    <div class="menu-btn" onclick="toggle()"><i class="fas fa-bars"></i></div>
</header>

<div class="sidebar" id="sidebar">
    <div style="text-align: right; font-size: 28px; cursor: pointer; margin-bottom: 10px;" onclick="toggle()">&times;</div>
    <h2 style="border-bottom: 2px solid var(--primary); padding-bottom: 10px;">Kategoriler</h2>
    <div id="catList"></div>
</div>

<div class="grid" id="movieGrid"></div>
<button id="loadMoreBtn" class="load-more" onclick="loadMore()">DAHA FAZLA GÖSTER</button>

<div id="movieModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="mImg" src="">
        <h2 id="mTitle"></h2>
        <div id="mInfo" style="color: var(--primary); font-size: 12px; font-weight: bold; margin-bottom: 10px;"></div>
        <div id="mDesc"></div>
        <div id="langButtons" class="lang-group"></div>
    </div>
</div>

<script>
    let all = [], filtered = [], limit = 20, activeCat = "Tümü";

    async function init() {
        try {
            const res = await fetch('movies.json');
            all = await res.json();
            filtered = all;
            renderCats(); render();
        } catch(e) { document.getElementById('movieGrid').innerHTML = "Veriler yüklenemedi."; }
    }

    function renderCats() {
        const cats = ["Tümü", ...new Set(all.map(m => m.category).filter(Boolean))];
        document.getElementById('catList').innerHTML = cats.map(c => 
            `<a href="#" class="cat-item ${c === activeCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</a>`
        ).join("");
    }

    function render() {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = filtered.slice(0, limit).map(f => `
            <div class="card" onclick="openModal('${f.id}', '${f.title.replace(/'/g, "\\'")}', '${f.image}', '${f.year}', '${f.category}')">
                <span class="badge">${f.category}</span>
                <img src="${f.image}" loading="lazy">
                <h3>${f.title}</h3>
            </div>
        `).join("");
        document.getElementById('loadMoreBtn').style.display = limit >= filtered.length ? 'none' : 'block';
    }

    function loadMore() { limit += 20; render(); }
    function setCat(c) { activeCat = c; filter(); toggle(); renderCats(); }
    function toggle() { document.getElementById('sidebar').classList.toggle('active'); }

    function filter() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        filtered = all.filter(m => (activeCat === "Tümü" || m.category === activeCat) && m.title.toLowerCase().includes(term));
        limit = 20; render();
    }

    async function openModal(id, title, img, year, cat) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mImg').src = img;
        document.getElementById('mInfo').innerText = `${year} • ${cat}`;
        document.getElementById('mDesc').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bilgiler aranıyor...';
        document.getElementById('langButtons').innerHTML = "";
        document.getElementById('movieModal').style.display = 'flex';

        try {
            const res = await fetch(`/api/info?id=${id}`);
            const data = await res.json();
            document.getElementById('mDesc').innerText = data.desc || "Açıklama bulunamadı.";
            
            if(data.languages && data.languages.length > 0) {
                data.languages.forEach(l => {
                    let icon = l.name.toLowerCase().includes('altyaz') ? 'fa-comment-dots' : 'fa-microphone-alt';
                    document.getElementById('langButtons').innerHTML += `<a href="${l.url}" target="_blank" class="play-btn"><i class="fas ${icon}"></i> ${l.name.toUpperCase()}</a>`;
                });
            }
        } catch(e) { document.getElementById('mDesc').innerText = "Bağlantı hatası."; }
    }

    function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
    window.onclick = function(e) { if(e.target == document.getElementById('movieModal')) closeModal(); }
    
    init();
</script>
</body>
</html>
